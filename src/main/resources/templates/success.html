<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Success</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>✅ Delivery Submitted</h2>
    <p>Your delivery request has been successfully submitted.</p>
    <button onclick="window.location.href='/api/home'">Done</button>
</div>

</body>
</html>
