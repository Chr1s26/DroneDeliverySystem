<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Delivery History</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .main {
            margin-left: 220px;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .content-card {
            width: 100%;
            max-width: 1100px;
            background: white;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 25px;
            color: #1f2937;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            font-size: 14px;
            vertical-align: top;
        }

        th {
            background: #f3f4f6;
            font-weight: 600;
            text-align: left;
        }

        tr:not(:last-child) {
            border-bottom: 1px solid #e5e7eb;
        }

        .pkg {
            font-weight: 600;
            color: #1f2937;
        }

        .desc {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
            max-width: 260px;
            line-height: 1.4;
        }

        .status {
            font-weight: 600;
            text-transform: capitalize;
        }

        .pending { color: #f59e0b; }
        .completed { color: #16a34a; }
        .cancelled { color: #dc2626; }

        .empty {
            text-align: center;
            padding: 40px 0;
            color: #6b7280;
            font-size: 15px;
        }
    </style>
</head>

<body>

<div th:replace="fragments/sidebar :: sidebar(${user})"></div>

<div class="main">
    <div class="content-card">
        <h1>📜 Delivery History</h1>

        <table th:if="${#lists.size(deliveries) > 0}">
            <thead>
            <tr>
                <th>Package</th>
                <th>Receiver</th>
                <th>Phone</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="d : ${deliveries}">
                <td>
                    <div class="pkg" th:text="${d.packageName}"></div>
                    <div class="desc" th:text="${d.packageDescription}"></div>
                </td>
                <td th:text="${d.receiverName}"></td>
                <td th:text="${d.receiverPhone}"></td>
                <td class="status"
                    th:classappend="
                        ${d.status == 'PROCESSING'} ? 'pending' :
                        (${d.status == 'COMPLETED'} ? 'completed' : 'cancelled')
                    "
                    th:text="${d.status}">
                </td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${#lists.size(deliveries) == 0}">
            No deliveries found yet 🚁
        </div>
    </div>
</div>

</body>
</html>
