<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .card {
            width: 500px;
            background: white;
            padding: 50px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        h2 {
        text-align: center; margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
        }

        .error {
            color: #ef4444;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Reset Password</h2>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/auth/reset-password}" th:object="${resetPasswordForm}" method="post">
        <input type="password" th:field="*{password}" placeholder="New Password" required>
        <input type="password" th:field="*{confirmPassword}" placeholder="Confirm Password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>
</body>
</html>
