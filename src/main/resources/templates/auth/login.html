<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drone Delivery System - Login</title>

    <style>
        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: "Segoe UI", Arial, sans-serif;
          background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .card {
          width: 600px;
          background: white;
          padding: 60px;
          border-radius: 18px;
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .card h2 {
          text-align: center;
          margin-bottom: 20px;
        }

        .error {
          color: #ef4444;
          text-align: center;
          margin-bottom: 12px;
          font-size: 14px;
        }

        .card input {
          width: 100%;
          padding: 12px;
          margin-top: 12px;
          border-radius: 8px;
          border: 1px solid #ccc;
          font-size: 14px;
        }

        .card button {
          width: 100%;
          padding: 12px;
          margin-top: 18px;
          border-radius: 8px;
          border: none;
          background: #667eea;
          color: white;
          font-size: 15px;
          cursor: pointer;
        }

        .card button:hover {
          background: #556cd6;
        }

        .links {
          margin-top: 16px;
          text-align: center;
          font-size: 14px;
        }

        .links a {
          color: #667eea;
          text-decoration: none;
          margin: 0 6px;
        }

        .links a:hover {
          text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Drone Delivery System</h2>

    <!-- ✅ ERROR MESSAGE -->
    <div class="error" th:if="${error}" th:text="${error}"></div>

    <!-- LOGIN FORM -->
    <form action="/auth/login" method="post">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        <a href="/auth/register">Sign up</a> |
        <a href="/auth/forget-password">Forgot password?</a>
    </div>
</div>
</body>
</html>
