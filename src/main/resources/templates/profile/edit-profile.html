<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drone Delivery System - Edit Profile</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .main {
            margin-left: 220px;
            padding: 40px;
        }

        h1 {
            margin-top: 0;
            color: white;
            text-align: center;
        }

        .content-center {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .card {
            width: 100%;
            max-width: 620px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.25);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
        }

        label {
            display: block;
            font-size: 15px;
            font-weight: 600;
            margin-top: 18px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.15);
        }

        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 6px;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 18px;
            text-align: center;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #556cd6;
        }
    </style>
</head>

<body>


<div th:replace="fragments/sidebar :: sidebar(${user})"></div>

<div class="main">
    <h1>Edit Profile 👤</h1>

    <div class="content-center">
        <div class="card">

            <h2>Personal Information</h2>

            <div class="success" th:if="${success}" th:text="${success}"></div>

            <form th:action="@{/profile/edit}" th:object="${profile}" method="post">

                <label>Name</label>
                <input type="text" th:field="*{name}">
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

                <label>Email</label>
                <input type="email" th:field="*{email}">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

                <label>Phone</label>
                <input type="text" th:field="*{phone}">
                <div class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>

                <button type="submit">Save Changes</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
